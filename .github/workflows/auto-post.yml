name: Auto Post Articles

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日UTC 0:00 = JST 9:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate all genres (8 genres x 1 = 8 articles/day)
        env:
          API_ID: ${{ secrets.API_ID }}
          AFFILIATE_ID: ${{ secrets.AFFILIATE_ID }}
          SITE_NAME: ${{ secrets.SITE_NAME }}
        working-directory: scripts
        run: python main.py --genre all --count 1

      - name: Generate rankings
        env:
          API_ID: ${{ secrets.API_ID }}
          AFFILIATE_ID: ${{ secrets.AFFILIATE_ID }}
          SITE_NAME: ${{ secrets.SITE_NAME }}
        working-directory: scripts
        run: python generate_ranking.py

      - name: Tweet latest article
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        working-directory: scripts
        run: python tweet.py || true
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          git diff --staged --quiet || (git commit -m "auto: 全ジャンル記事自動生成 $(date +%Y-%m-%d)" && git push)

      - name: Ping Google Sitemap
        run: python scripts/ping_google.py
